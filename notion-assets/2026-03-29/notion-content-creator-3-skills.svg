    <path d="M1078 782c14 14 28 16 40 0" fill="none" stroke="#3b2f2f" stroke-width="6" stroke-linecap="round"/>
    <path d="M1034 660c18-28 42-38 64-30-18 20-24 38-22 60-18-2-30-10-42-30z" fill="#8f6d55"/>
    <path d="M1134 662c22-22 44-28 62-18-18 16-28 34-30 54-12-6-20-16-32-36z" fill="#8f6d55"/>
